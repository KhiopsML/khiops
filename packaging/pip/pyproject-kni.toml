[build-system]
requires = [
    "ninja",
    "scikit-build-core>=0.11.6"
]
build-backend = "scikit_build_core.build"

[project]
name = "khiops-kni"
description = "Khiops Native Interface (KNI) - C library for model deployment and scoring."
readme = "README.md"
license = "BSD-3-Clause-Clear"
license-files = ["LICENSE"]
authors = [{name = "The Khiops Team", email = "khiops.team@orange.com"}]
dependencies = []
dynamic = ["version"]

[tool.scikit-build]
# CPython 3.9 stable ABI: use cp39 tag to ensure compatibility only with Python 3.9+
# (py3 is for pure Python packages only)
wheel.py-api = "cp39"
# Read CMake minimal version from file
cmake.version = "CMakeLists.txt"
# Generator specification and build configuration
cmake.args = ["-G", "Ninja"]
# CMake variables
cmake.define.CMAKE_BUILD_TYPE = "Release"
# Options
cmake.define.MPI = false
cmake.define.TESTING = false
cmake.define.BUILD_LEX_YACC = false
cmake.define.BUILD_JARS = false
cmake.define.GENERATE_VIEWS = false
cmake.define.C11 = true
# Force the use of Ninja for fast builds
ninja.make-fallback = false
# Only install KNI component in wheel
build.targets = ["KhiopsNativeInterface"]
install.components = ["KNI"]

[tool.scikit-build.metadata]
# Read package version from file, adapt it for Python version specification
version.provider = "scikit_build_core.metadata.regex"
version.input = "src/Learning/KWUtils/KWKhiopsVersion.h"
# Example #define PP-instruction: #define KHIOPS_VERSION KHIOPS_STR(10.5.0-a.1)
# Example version string: 10.5.0-a.1
# Python equivalent: 10.5.0a1
version.regex = '''(?x)
    \# \s* define \s+ KHIOPS_VERSION \s+ KHIOPS_STR
    \(
    (?P<major> \d+)
    \.
    (?P<minor> \d+)
    \.
    (?P<patch> \d+)
    (?:
        -
        (?P<prereltype> a | b | rc)
        \.
        (?P<prereln> \d+)
    )?
    \)
'''
version.result = "{major}.{minor}.{patch}{prereltype}{prereln}"
version.remove = "(None){,2}$"  # prereltype and prereln groups are None if not found

[tool.cibuildwheel]
# Restrict builds to CPython 3.9 only: KNI is a pure C library with stable ABI, so wheels for other Python 3.x versions would be identical.
# This avoids redundant builds and simplifies distribution; update if future ABI changes or Python-specific bindings are introduced.
build = "cp39*"
# KNI does not compile when using musl as the C standard library, and 32-bit is not supported
skip = ["*musllinux*", "*win32*"]

[tool.cibuildwheel.linux]
# Repair wheel to convert linux_* tags to manylinux_* (required by PyPI)
repair-wheel-command = "auditwheel repair -w {dest_dir} {wheel}"

[tool.cibuildwheel.macos]
# No dependency
repair-wheel-command = ""

[tool.cibuildwheel.windows]
repair-wheel-command = ""